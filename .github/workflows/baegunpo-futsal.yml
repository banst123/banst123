      - name: Merge futsal results (구장 조합 검사)
        id: merge_step
        env:
          MODE: merge
        run: |
          echo "GITHUB_OUTPUT=$GITHUB_OUTPUT" >> $GITHUB_ENV
          node scripts/check-futsal.js

      - name: 디버그 - 텔레그램 env 확인
        if: ${{ steps.merge_step.outputs.available == 'true' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "TELEGRAM_TOKEN is set? -> ${TELEGRAM_TOKEN:+YES}"
          echo "TELEGRAM_CHAT_ID is set? -> ${TELEGRAM_CHAT_ID:+YES}"

      - name: 예약 가능시 텔레그램 발송
        if: ${{ steps.merge_step.outputs.available == 'true' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FUTSAL_MESSAGE: ${{ steps.merge_step.outputs.message }}
        run: |
          node - << 'EOF'
          const https = require('https');

          const token = process.env.TELEGRAM_TOKEN;
          const chatId = process.env.TELEGRAM_CHAT_ID;
          const text = process.env.FUTSAL_MESSAGE || '';

          console.log('DBG token exists:', !!token);
          console.log('DBG chatId exists:', !!chatId);

          if (!token || !chatId) {
            console.error('TELEGRAM_TOKEN 또는 TELEGRAM_CHAT_ID 누락');
            process.exit(1);
          }

          const payload = JSON.stringify({
            chat_id: chatId,
            text,
            parse_mode: 'HTML',
            disable_web_page_preview: true,
          });

          const options = {
            hostname: 'api.telegram.org',
            path: `/bot${token}/sendMessage`,
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload),
            },
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', (chunk) => (data += chunk));
            res.on('end', () => {
              console.log('텔레그램 응답:', data);
            });
          });

          req.on('error', (err) => {
            console.error('텔레그램 요청 실패:', err);
            process.exit(1);
          });

          req.write(payload);
          req.end();
          EOF
