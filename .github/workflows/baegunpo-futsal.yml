Name: 백운포 풋살장 예약 모니터링

on:
  schedule:
    - cron: '*/15 * * * *'   # 15분마다 실행
  workflow_dispatch:

jobs:
  # 1) 구장별 크롤링 (수집 전용)
  collect-futsal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        place_index: [0, 1, 2, 3]   # 0=1구장, 1=2구장, 2=3구장, 3=4구장

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (npm 캐시 활성화)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ⚡ Puppeteer 브라우저 바이너리 전용 캐시 설정
      - name: Cache Puppeteer Chrome
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      - name: 의존성 설치
        run: npm ci || npm install

      # ⚡ 캐시 미스(Cache Miss) 시에만 Chrome 브라우저 설치
      - name: Puppeteer 브라우저 설치
        if: steps.cache-puppeteer.outputs.cache-hit != 'true'
        run: npx puppeteer browsers install chrome

      - name: 구장별 수집 (collect 모드)
        env:
          MODE: collect
          PLACE_INDEX: ${{ matrix.place_index }}
        run: node scripts/check-futsal.js

      - name: 수집 결과 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: futsal_results_${{ matrix.place_index }}
          path: scripts/futsal_results_${{ matrix.place_index }}.json

  # 2) 4개 구장 결과 통합 + 연속 2시간 판정 (merge 모드)
  merge-futsal:
    runs-on: ubuntu-latest
    needs: collect-futsal

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정 (npm 캐시 활성화)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci || npm install

      # 4개 구장 결과 아티팩트 다운로드
      - name: futsal_results_0 다운로드
        uses: actions/download-artifact@v4
        with:
          name: futsal_results_0
          path: scripts

      - name: futsal_results_1 다운로드
        uses: actions/download-artifact@v4
        with:
          name: futsal_results_1
          path: scripts

      - name: futsal_results_2 다운로드
        uses: actions/download-artifact@v4
        with:
          name: futsal_results_2
          path: scripts

      - name: futsal_results_3 다운로드
        uses: actions/download-artifact@v4
        with:
          name: futsal_results_3
          path: scripts

      # 4개 JSON 합쳐서 구장 섞인 연속 2시간 판정 + 중복 알림 방지
      - name: Merge futsal results (구장 조합 검사)
        id: merge_step
        env:
          MODE: merge
        run: |
          echo "GITHUB_OUTPUT=$GITHUB_OUTPUT" >> $GITHUB_ENV
          node scripts/check-futsal.js

      - name: 디버그 - 텔레그램 env 확인
        if: ${{ steps.merge_step.outputs.available == 'true' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "TELEGRAM_TOKEN is set? -> ${TELEGRAM_TOKEN:+YES}"
          echo "TELEGRAM_CHAT_ID is set? -> ${TELEGRAM_CHAT_ID:+YES}"

      - name: 예약 가능시 텔레그램 발송
        if: ${{ steps.merge_step.outputs.available == 'true' }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FUTSAL_MESSAGE: ${{ steps.merge_step.outputs.message }}
        run: |
          node - << 'EOF'
          const https = require('https');

          const token = process.env.TELEGRAM_TOKEN;
          const chatId = process.env.TELEGRAM_CHAT_ID;
          const text = process.env.FUTSAL_MESSAGE || '';

          console.log('DBG token exists:', !!token);
          console.log('DBG chatId exists:', !!chatId);

          if (!token || !chatId) {
            console.error('TELEGRAM_TOKEN 또는 TELEGRAM_CHAT_ID 누락');
            process.exit(1);
          }

          const payload = JSON.stringify({
            chat_id: chatId,
            text,
            parse_mode: 'HTML',
            disable_web_page_preview: true,
          });

          const options = {
            hostname: 'api.telegram.org',
            path: `/bot${token}/sendMessage`,
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload),
            },
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', (chunk) => (data += chunk));
            res.on('end', () => {
              console.log('텔레그램 응답:', data);
            });
          });

          req.on('error', (err) => {
            console.error('텔레그램 요청 실패:', err);
            process.exit(1);
          });

          req.write(payload);
          req.end();
          EOF

      - name: 예약 가능시 로그로 메시지 출력 (테스트용)
        if: ${{ steps.merge_step.outputs.available == 'true' }}
        run: |
          echo "=================================================="
          echo "📱 실제 발송될 문자/알림 내용:"
          echo "=================================================="
          echo "${{ steps.merge_step.outputs.message }}"

      - name: seen_futsal.json 변경사항 커밋/푸시
        if: ${{ steps.merge_step.outputs.available == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update seen futsal cache"
          file_pattern: seen_futsal.json
