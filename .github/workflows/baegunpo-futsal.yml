name: 백운포 풋살 모니터링

on:
  workflow_dispatch:

jobs:
  futsal_monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Checkout
        uses: actions/checkout@v4

      - name: Step 2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Step 3 - Install dependencies
        run: npm install

      - name: Step 4 - Check futsal availability
        id: check
        run: npm run check:futsal

      - name: Step 5 - Send Telegram notification
        if: steps.check.outputs.available == 'true'
        run: |
          echo "Telegram step started"
          MSG="${{ steps.check.outputs.message }}"
          curl -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TG_CHAT_ID}\", \"text\": \"${MSG}\"}"
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
