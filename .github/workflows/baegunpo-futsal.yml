name: 백운포 풋살장 예약 모니터링

on:
  schedule:
    - cron: '*/10 * * * *' # 10분마다 실행 (원하는 주기로 변경 가능)
  workflow_dispatch:       # 수동 실행 버튼 활성화

jobs:
  check-futsal:
    runs-on: ubuntu-latest
    strategy:
      # max-parallel: 4 # 4개 구장을 완전히 동시에 실행
      matrix:
        place_index: [0, 1, 2, 3] # 0=1구장, 1=2구장, 2=3구장, 3=4구장
        
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-node-version: 20

      - name: 의존성 설치
        run: npm install puppeteer

      - name: 구장별 독립 크롤링 실행
        id: run_script
        env:
          PLACE_INDEX: ${{ matrix.place_index }} # 가상 컴퓨터별로 자신의 구장 인덱스를 주입
        run: node check-futsal.js

      # 💬 여기에 사용 중이신 문자/슬랙/카카오톡 발송 액션을 추가하시면 됩니다.
      # 각 구장 컴퓨터가 독립적으로 돌기 때문에 문자도 구장별로 따로 발송됩니다.
      - name: 예약 가능시 문자 발송
        if: steps.run_script.outputs.available == 'true'
        run: |
          echo "문자 발송 내용:"
          echo "${{ steps.run_script.outputs.message }}"
          # 실제 SMS API 호출 스크립트를 여기에 연동하시면 됩니다.
